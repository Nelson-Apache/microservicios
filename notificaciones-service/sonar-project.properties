# =====================================================
# SonarQube — Configuración para notificaciones-service
# =====================================================
# Lenguaje: JavaScript (Node.js / Express)
# Cobertura: Jest + LCOV
# =====================================================

sonar.projectKey=notificaciones-service
sonar.projectName=Notificaciones Service
sonar.projectVersion=1.0.0

# Código fuente
sonar.sources=src
sonar.tests=tests

# Lenguaje
sonar.language=js
sonar.sourceEncoding=UTF-8

# Cobertura (generada por Jest con --coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusiones
sonar.exclusions=**/node_modules/**,**/coverage/**,**/*.test.js,**/*.spec.js

# Servidor SonarQube
sonar.host.url=http://sonarqube:9000

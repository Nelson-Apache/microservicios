services:

  # ─────────────────────────────────────
  # API Gateway (Python/FastAPI) — Punto de entrada único
  # ─────────────────────────────────────
  api-gateway:
    build: ./api-gateway
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    environment:
      - JWT_SECRET=${JWT_SECRET:-changeme-super-secret-key-for-dev}
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL:-http://auth-service:8085}
      - EMPLEADOS_SERVICE_URL=${EMPLEADOS_SERVICE_URL:-http://empleados-service:8080}
      - DEPARTAMENTOS_SERVICE_URL=${DEPARTAMENTOS_SERVICE_URL:-http://departamentos-service:8080}
      - NOTIFICACIONES_SERVICE_URL=${NOTIFICACIONES_SERVICE_URL:-http://notificaciones-service:3000}
      - PERFILES_SERVICE_URL=${PERFILES_SERVICE_URL:-http://perfiles-service:3000}
      - REPORTES_SERVICE_URL=${REPORTES_SERVICE_URL:-http://reportes-service:3000}
    depends_on:
      auth-service:
        condition: service_healthy
      empleados-service:
        condition: service_healthy
      departamentos-service:
        condition: service_healthy
    networks:
      - microservices-net
    restart: on-failure:5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ─────────────────────────────────────
  # Servicio de Autenticación (Python/FastAPI)
  # ─────────────────────────────────────
  auth-service:
    build: ./auth-service
    ports:
      - "${AUTH_SERVICE_PORT:-8085}:8085"
    environment:
      - DATABASE_URL=postgresql://${AUTH_DB_USER:-postgres}:${AUTH_DB_PASSWORD:-postgres}@db-auth:5432/${AUTH_DB_NAME:-authdb}
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/}
      - JWT_SECRET=${JWT_SECRET:-changeme-super-secret-key-for-dev}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@empresa.com}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      - RESET_TOKEN_EXPIRE_MINUTES=${RESET_TOKEN_EXPIRE_MINUTES:-60}
    depends_on:
      db-auth:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - microservices-net
    restart: on-failure:5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8085/health')" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  # ─────────────────────────────────────
  # Base de Datos — Auth (PostgreSQL)
  # ─────────────────────────────────────
  db-auth:
    image: postgres:15-alpine
    container_name: db-auth
    environment:
      - POSTGRES_USER=${AUTH_DB_USER:-postgres}
      - POSTGRES_PASSWORD=${AUTH_DB_PASSWORD:-postgres}
      - POSTGRES_DB=${AUTH_DB_NAME:-authdb}
    volumes:
      - auth-data:/var/lib/postgresql/data
    networks:
      - microservices-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${AUTH_DB_USER:-postgres} -d ${AUTH_DB_NAME:-authdb}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─────────────────────────────────────
  # Servicio de Empleados (Python/FastAPI)
  # ─────────────────────────────────────
  empleados-service:
    build: ./empleados-service
    ports:
      - "8080:${EMPLEADOS_SERVICE_PORT:-8080}"
    environment:
      - DATABASE_URL=postgresql://${EMPLEADOS_DB_USER:-postgres}:${EMPLEADOS_DB_PASSWORD:-postgres}@${EMPLEADOS_DB_HOST:-database-empleados}:${EMPLEADOS_DB_PORT:-5432}/${EMPLEADOS_DB_NAME:-empleadosdb}
      - DEPARTAMENTOS_SERVICE_URL=${DEPARTAMENTOS_SERVICE_URL:-http://departamentos-service:8080}
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/}
    depends_on:
      database-empleados:
        condition: service_healthy
      departamentos-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - microservices-net
    restart: on-failure:5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  # ─────────────────────────────────────
  # Servicio de Departamentos (Java/Spring Boot) — multi-stage Dockerfile
  # ─────────────────────────────────────
  departamentos-service:
    build:
      context: ./departamentos-service
      target: runtime
    ports:
      - "8081:${DEPARTAMENTOS_SERVICE_PORT:-8080}"
    environment:
      - DATABASE_URL=jdbc:postgresql://${DEPARTAMENTOS_DB_HOST:-database-departamentos}:${DEPARTAMENTOS_DB_PORT:-5432}/${DEPARTAMENTOS_DB_NAME:-departamentosdb}
      - DB_USER=${DEPARTAMENTOS_DB_USER:-postgres}
      - DB_PASSWORD=${DEPARTAMENTOS_DB_PASSWORD:-postgres}
      - PORT=${DEPARTAMENTOS_SERVICE_PORT:-8080}
    depends_on:
      database-departamentos:
        condition: service_healthy
    networks:
      - microservices-net
    restart: on-failure:5
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 768M
        reservations:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # ─────────────────────────────────────
  # Servicio de Notificaciones (Consumidor)
  # ─────────────────────────────────────
  notificaciones-service:
    build:
      context: ./notificaciones-service
      dockerfile: Dockerfile
    container_name: notificaciones-service
    ports:
      - "8082:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:postgres@database-notificaciones:5432/notificacionesdb
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
    depends_on:
      rabbitmq:
        condition: service_healthy
      database-notificaciones:
        condition: service_healthy
    networks:
      - microservices-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ─────────────────────────────────────
  # Servicio de Reportes (Go)
  # ─────────────────────────────────────
  reportes-service:
    build:
      context: ./reportes-service
      target: runtime
    ports:
      - "8083:${REPORTES_SERVICE_PORT:-3000}"
    environment:
      - PORT=${REPORTES_SERVICE_PORT:-3000}
      - EMPLEADOS_SERVICE_URL=${EMPLEADOS_SERVICE_URL:-http://empleados-service:8080}
      - DEPARTAMENTOS_SERVICE_URL=${DEPARTAMENTOS_SERVICE_URL:-http://departamentos-service:8080}
    depends_on:
      empleados-service:
        condition: service_healthy
      departamentos-service:
        condition: service_healthy
    networks:
      - microservices-net
    restart: on-failure:5
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 384M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ─────────────────────────────────────
  # Base de Datos — Departamentos (PostgreSQL)
  # ─────────────────────────────────────
  database-departamentos:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${DEPARTAMENTOS_DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DEPARTAMENTOS_DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DEPARTAMENTOS_DB_NAME:-departamentosdb}
    volumes:
      - departamentos-data:/var/lib/postgresql/data
    networks:
      - microservices-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DEPARTAMENTOS_DB_USER:-postgres} -d ${DEPARTAMENTOS_DB_NAME:-departamentosdb}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─────────────────────────────────────
  # Base de Datos — Empleados (PostgreSQL)
  # ─────────────────────────────────────
  database-empleados:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${EMPLEADOS_DB_USER:-postgres}
      - POSTGRES_PASSWORD=${EMPLEADOS_DB_PASSWORD:-postgres}
      - POSTGRES_DB=${EMPLEADOS_DB_NAME:-empleadosdb}
    volumes:
      - empleados-data:/var/lib/postgresql/data
    networks:
      - microservices-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${EMPLEADOS_DB_USER:-postgres} -d ${EMPLEADOS_DB_NAME:-empleadosdb}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─────────────────────────────────────
  # Message Broker (RabbitMQ)
  # ─────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq-broker
    ports:
      - "5672:5672" # Puerto principal AMQP
      - "15672:15672" # Interfaz web de administración
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-guest}
    networks:
      - microservices-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 15s
      timeout: 30s
      retries: 5
      start_period: 120s
      start_interval: 10s

  # ─────────────────────────────────────
  # Base de Datos Notificaciones (PostgreSQL)
  # ─────────────────────────────────────
  database-notificaciones:
    image: postgres:15-alpine
    container_name: db-notificaciones
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=notificacionesdb
    volumes:
      - notificaciones-data:/var/lib/postgresql/data
    networks:
      - microservices-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d notificacionesdb" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────
  # Servicio de Gestión de Perfiles (Node.js)
  # ─────────────────────────────────────
  perfiles-service:
    build:
      context: ./perfiles-service
      dockerfile: Dockerfile
    container_name: perfiles-service
    ports:
      - "${PERFILES_SERVICE_PORT:-8084}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:postgres@database-perfiles:5432/perfilesdb
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
    depends_on:
      rabbitmq:
        condition: service_healthy
      database-perfiles:
        condition: service_healthy
    networks:
      - microservices-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ─────────────────────────────────────
  # Base de Datos Perfiles (PostgreSQL)
  # ─────────────────────────────────────
  database-perfiles:
    image: postgres:15-alpine
    container_name: db-perfiles
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=perfilesdb
    volumes:
      - perfiles-data:/var/lib/postgresql/data
    networks:
      - microservices-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d perfilesdb" ]
      interval: 10s
      timeout: 5s
      retries: 5

# ─────────────────────────────────────
# Volúmenes persistentes
# ─────────────────────────────────────
volumes:
  empleados-data:
    name: vol-empleados
  departamentos-data:
    name: vol-departamentos
  notificaciones-data:
    name: notificaciones-data
  perfiles-data:
    name: perfiles-data
  auth-data:
    name: auth-data

# ─────────────────────────────────────
# Red interna de microservicios
# ─────────────────────────────────────
networks:
  microservices-net:
    driver: bridge
    name: microservices-network
